<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nadie te dijo que iba a ser así</title>
    <meta
      name="description"
      content="Portada pública de la serie Nadie te dijo que iba a ser así."
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="splash" aria-label="Portada">
      <video
        class="background-video"
        autoplay
        muted
        loop
        playsinline
        poster="assets/images/ntdqiasa_fire_smoke_ash_poster.jpg"
      >
        <source src="assets/video/ntdqiasa_fire_smoke_ash_web.mp4" type="video/mp4" />
      </video>

      <div class="image-fallback" aria-hidden="true"></div>
      <div class="dark-overlay" aria-hidden="true"></div>
      <div class="siren-overlay" aria-hidden="true"></div>
      <div class="grain-overlay" aria-hidden="true"></div>

      <section class="plates" id="plates" aria-label="Placas de portada">
        <article class="plate plate--ska" aria-label="SKA Films">
          <img
            class="plate__logo"
            src="assets/logos/ska-films.png"
            alt="SKA Films"
          />
        </article>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
