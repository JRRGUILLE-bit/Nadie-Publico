<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nadie te dijo que iba a ser así</title>
    <meta
      name="description"
      content="Portada pública de la serie Nadie te dijo que iba a ser así."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="splash" aria-label="Portada">
      <video
        class="background-video"
        autoplay
        muted
        loop
        playsinline
        poster="assets/images/ntdqiasa_video_v3_poster.jpg"
      >
        <source src="assets/video/ntdqiasa_video_v3_web.mp4" type="video/mp4" />
      </video>

      <div class="image-fallback" aria-hidden="true"></div>
      <div class="dark-overlay" aria-hidden="true"></div>
      <div class="siren-overlay" aria-hidden="true"></div>
      <div class="grain-overlay" aria-hidden="true"></div>

      <section class="plates" id="plates" aria-label="Placas de portada" aria-live="polite">
        <div class="plate" id="active-plate" aria-hidden="true"></div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
